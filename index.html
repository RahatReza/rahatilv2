<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Premium Charm Bar &amp; Jewelry - Curated Elegance">
<title>Charm &amp; Co. | Bespoke Jewelry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&amp;family=Lato:wght@300;400;700&amp;display=swap" rel="stylesheet">
</head>
<body>

<div id="cms-toast" class="">Editor Ready: Click text to edit. Ctrl+Shift+S to save.</div>

<header>
<div class="logo editable" contenteditable="true">CHARM &amp; CO.</div>
</header>

<section class="hero"></section>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const toast = document.getElementById('cms-toast');

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 3000);
    }

    function saveSite() {
        const clone = document.documentElement.cloneNode(true);
        const htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'index.html';
        document.body.appendChild(a);
        a.click();

        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast('Downloading updated site... Replace original file.');
    }

    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 's' || e.key === 'S')) {
            e.preventDefault();
            saveSite();
        }
    });

    // ✅ FIXED IMAGE SWAPPER (Only corrected section)
    document.querySelectorAll('.card-image, .about-image, .hero').forEach(el => {
        el.addEventListener('dblclick', () => {
            const currentUrl = el.style.backgroundImage.slice(5, -2);
            const newUrl = prompt("Enter new image URL:", currentUrl);
            if (newUrl) {
                el.style.backgroundImage = "url('" + newUrl + "')";
            }
        });
    });

    showToast('Editor Ready: Click text to edit. Ctrl+Shift+S to save.');
});
</script>



</body></html>
